services:
  docmost:
    build:
      context: .
      dockerfile: Dockerfile
    image: persua-docmost:pt-br
    container_name: persua-docmost
    depends_on:
      - db
      - redis
    environment:
      APP_URL: "http://localhost:3000"
      APP_SECRET: "da5e36c3364f2cf8a90cbab48bb9fc152a61fb942020d75c2344c616688f19cd"
      DATABASE_URL: "postgresql://docmost:9534f26fd35b08a6fe39e50779b677d4@db:5432/docmost?schema=public"
      REDIS_URL: "redis://redis:6379"
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - docmost_data:/app/data/storage

  db:
    image: postgres:16-alpine
    container_name: persua-docmost-db
    environment:
      POSTGRES_DB: docmost
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: "9534f26fd35b08a6fe39e50779b677d4"
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: persua-docmost-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  docmost_data:
  db_data:
  redis_data:
